<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Debbie's Insurance Study Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }

body {
  font-family: 'Inter', sans-serif;
  background: #f0faf5;
  color: #1a2e25;
  min-height: 100vh;
  padding-bottom: 60px;
}

/* HEADER */
.hero {
  background: linear-gradient(160deg, #e8f7f0 0%, #f5fdf9 100%);
  text-align: center;
  padding: 44px 24px 32px;
  border-bottom: 1px solid #c8e8d8;
}
.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.9rem, 7vw, 2.8rem);
  font-weight: 700;
  color: #1a3a28;
  line-height: 1.2;
  margin-bottom: 12px;
}
.hero h1 em {
  font-style: italic;
  color: #1D9E75;
}
.hero p {
  font-size: clamp(.9rem, 3vw, 1rem);
  color: #4a7a60;
  font-weight: 500;
  margin-bottom: 28px;
}

/* QUIZ NAV CIRCLES */
.quiz-nav {
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
}
.nav-btn {
  font-family: 'Inter', sans-serif;
  font-size: .85rem;
  font-weight: 700;
  padding: 10px 20px;
  border: 2px solid #1D9E75;
  border-radius: 50px;
  background: white;
  color: #1D9E75;
  cursor: pointer;
  transition: all .2s;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
.nav-btn.active {
  background: #1D9E75;
  color: white;
}
.nav-btn:active { transform: scale(.97); }

/* SECTION */
.quiz-section { display: none; padding: 20px 16px 0; }
.quiz-section.active { display: block; }

.section-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.1rem, 4vw, 1.4rem);
  font-weight: 700;
  color: #1a3a28;
  margin-bottom: 4px;
}
.section-sub {
  font-size: .88rem;
  color: #4a7a60;
  font-weight: 500;
  margin-bottom: 16px;
}

/* SCORE */
.scorebar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
  background: white;
  border: 1.5px solid #c8e8d8;
  border-radius: 14px;
  padding: 12px 16px;
  margin-bottom: 10px;
}
.score-label { font-size: .88rem; font-weight: 700; color: #4a7a60; }
.score-value { font-size: 1.4rem; font-weight: 800; color: #1D9E75; }
.restart-btn {
  font-family: 'Inter', sans-serif;
  font-size: .82rem;
  font-weight: 700;
  padding: 8px 16px;
  background: #e8f7f0;
  color: #0F6E56;
  border: 1.5px solid #c8e8d8;
  border-radius: 50px;
  cursor: pointer;
}
.restart-btn:active { background: #c8e8d8; }

/* PROGRESS */
.prog-wrap {
  background: #c8e8d8;
  border-radius: 50px;
  height: 7px;
  margin-bottom: 4px;
  overflow: hidden;
}
.prog-fill {
  height: 100%;
  background: #1D9E75;
  border-radius: 50px;
  transition: width .4s ease;
  width: 0%;
}
.prog-text {
  text-align: center;
  font-size: .78rem;
  font-weight: 600;
  color: #4a7a60;
  margin-bottom: 16px;
}

/* CARD */
.card {
  background: white;
  border: 1.5px solid #c8e8d8;
  border-radius: 18px;
  padding: 20px 16px;
  margin-bottom: 14px;
  animation: fadeUp .3s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.q-badge {
  display: inline-block;
  background: #e8f7f0;
  color: #0F6E56;
  font-size: .7rem;
  font-weight: 700;
  letter-spacing: .4px;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 20px;
  margin-bottom: 10px;
}
.q-text {
  font-size: clamp(1rem, 3.8vw, 1.12rem);
  font-weight: 700;
  line-height: 1.6;
  margin-bottom: 16px;
  color: #1a2e25;
}

/* OPTIONS */
.options { display: flex; flex-direction: column; gap: 10px; }

.opt-btn {
  font-family: 'Inter', sans-serif;
  font-size: clamp(.92rem, 3.4vw, 1.02rem);
  font-weight: 600;
  text-align: left;
  min-height: 52px;
  padding: 12px 14px;
  border: 1.5px solid #c8e8d8;
  border-radius: 12px;
  cursor: pointer;
  background: white;
  color: #1a2e25;
  display: flex;
  align-items: center;
  gap: 12px;
  line-height: 1.4;
  transition: border-color .15s;
  -webkit-tap-highlight-color: transparent;
}
.opt-btn:active:not(:disabled) { background: #f0faf5; }

.opt-letter {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: #f0faf5;
  border: 1.5px solid #c8e8d8;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .78rem;
  font-weight: 800;
  color: #4a7a60;
  flex-shrink: 0;
}

.opt-btn.correct { background: #e8f7f0; border-color: #1D9E75; color: #0F6E56; }
.opt-btn.correct .opt-letter { background: #1D9E75; border-color: #1D9E75; color: white; }
.opt-btn.wrong   { background: #FAECE7; border-color: #D85A30; color: #D85A30; }
.opt-btn.wrong .opt-letter   { background: #D85A30; border-color: #D85A30; color: white; }
.opt-btn:disabled { cursor: default; }

/* FEEDBACK */
.feedback { display: none; margin-top: 12px; padding: 14px 16px; border-radius: 12px; font-size: clamp(.88rem, 3.2vw, .96rem); line-height: 1.65; }
.fb-correct { display: block; background: #e8f7f0; border: 1.5px solid #1D9E75; color: #0F6E56; }
.fb-wrong   { display: block; background: #FAECE7; border: 1.5px solid #D85A30; color: #9e3010; }
.fb-label   { font-weight: 800; display: block; margin-bottom: 5px; font-size: 1rem; }

footer {
  text-align: center;
  padding: 36px 20px 10px;
  font-size: .82rem;
  font-weight: 600;
  color: #4a7a60;
}
</style>
</head>
<body>

<div class="hero">
  <h1>Study Smarter,<br>Pass with <em>Confidence</em></h1>
  <p>Built for Debbie — study together, one question at a time. 🤍</p>
  <div class="quiz-nav">
    <button class="nav-btn active" onclick="switchTab('q1', this)">📝 Quiz 1</button>
    <!-- ADD MORE QUIZ BUTTONS HERE AS DEBBIE SENDS MORE CONCEPTS -->
    <!-- <button class="nav-btn" onclick="switchTab('q2', this)">📝 Quiz 2</button> -->
  </div>
</div>

<!-- QUIZ 1 -->
<div id="q1" class="quiz-section active">
  <div class="section-title">Insurance Fundamentals</div>
  <div class="section-sub">Read the definition · Choose the correct term</div>

  <div class="scorebar">
    <span class="score-label">Score</span>
    <span class="score-value" id="s1">0 / 0</span>
    <button class="restart-btn" onclick="buildQ1()">↺ Restart</button>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="bar1"></div></div>
  <div class="prog-text" id="prog1">0 of 0 answered</div>
  <div id="cards1"></div>
</div>

<footer>Made for Debbie · You're going to pass that exam! 🎉</footer>

<script>
// ═══════════════════════════════════════════════════════════
//  QUESTION BANK — ADD NEW QUESTIONS AT THE BOTTOM
//  Fields:
//    term    — correct answer shown to user
//    def     — definition shown as the question
//    wrong   — exactly 3 wrong choices
//    explain — explanation shown after answering
// ═══════════════════════════════════════════════════════════
var QUESTIONS = [
  {
    term: "Occurrence",
    def: "An event that results in an insured loss. Unlike an accident, the loss does NOT have to be sudden — it can result from continuous or repeated exposure causing bodily injury or property damage neither expected nor intended by the insured.",
    wrong: ["Accident", "Incident", "Fortuitous Event"],
    explain: "If someone breathes in dust at a factory every day for 10 years and gets sick, that's not a sudden accident — it built up slowly. That slow build-up that causes a covered loss is called an Occurrence."
  },
  {
    term: "Risk Reduction",
    def: "Taking steps to reduce the probability or severity of a possible loss — for example, installing alarms and sprinkler systems to reduce fire loss risk. One of the 4 major risk management techniques.",
    wrong: ["Fire Loss Reduction", "Loss Prevention", "Hazard Reduction"],
    explain: "Before a big storm, smart families board up their windows so less damage happens. That's Risk Reduction: taking smart steps ahead of time to make a loss less likely or less damaging if it does happen."
  },
  {
    term: "Moral Hazard",
    def: "A condition of morals or habits that increases the probability of loss from a peril — for example, someone who previously burned their own property to collect insurance.",
    wrong: ["Peril Condition", "Intentional Hazard", "Morale Hazard"],
    explain: "Imagine a kid who accidentally breaks his toys more often after learning his parents will always buy new ones. Moral Hazard is when someone's dishonest habits make losses more likely to happen intentionally."
  },
  {
    term: "Peril",
    def: "The cause of possible loss.",
    wrong: ["Exposure", "Risk", "Hazard"],
    explain: "If your house catches fire, what caused the damage? The fire. Fire is the Peril. A peril is always the actual thing that caused the loss — fire, flood, theft, windstorm."
  },
  {
    term: "Speculative Risk",
    def: "Uncertainty as to whether a gain OR loss will occur — such as a business that might make money or lose it. These types of risks are NOT insurable.",
    wrong: ["Normal Risk", "Loss Risk", "Pure Risk"],
    explain: "Starting a lemonade stand could make you money OR lose you money. That's Speculative Risk: two possible directions, win or lose. Insurance will never cover this because you might actually profit."
  },
  {
    term: "Insurer",
    def: "The party to an insurance arrangement who undertakes to indemnify for losses or provide benefits. Preferred over the terms 'carrier' or 'company' in statutory law.",
    wrong: ["Owner", "Insured", "Carrier"],
    explain: "Someone has to be the one who promises to pay when something goes wrong. That's the Insurer. In everyday life we call them the insurance company, but on the exam and in the law, the official word is always Insurer."
  },
  {
    term: "Exposure",
    def: "The state of being subject to the possibility of loss — measured by payroll, gate receipts, area, or other standards.",
    wrong: ["Risk Factor", "Hazard", "Peril"],
    explain: "If you stand outside in the rain without an umbrella, you're exposed to getting wet. In insurance, Exposure is how much of something is out in the rain — how many employees, how big the building, how many tickets sold."
  },
  {
    term: "Law of Large Numbers",
    def: "This law states: the larger the number of exposures considered, the more closely losses will match the underlying probability of loss — similar to how flipping a coin many times approaches 50/50.",
    wrong: ["Actuary Law", "Probability Law", "Mortality Table"],
    explain: "If you flip a coin 4 times, you might get heads every time. But flip it 10,000 times and you will land very close to 50% heads. That's the Law of Large Numbers — and it's how insurance companies know what to charge!"
  },
  {
    term: "Accident",
    def: "A fortuitous event — unforeseen and unintended.",
    wrong: ["Occurrence", "Continuity", "Incident"],
    explain: "Think of a kid on a bike who suddenly hits a pothole and falls. Nobody planned it, nobody wanted it — that surprise, unplanned event is exactly what an Accident means in insurance."
  },
  {
    term: "Protection",
    def: "This term is used interchangeably with 'coverage' to denote the insurance provided under a policy. It also indicates the existence of fire-fighting facilities in a 'protected' area.",
    wrong: ["Conditions", "Restrictions", "Coverage Area"],
    explain: "When your mom puts a raincoat on you before school, she's giving you protection. Insurance works the same way — it covers you from harm. That's why Protection and coverage mean the exact same thing in an insurance policy."
  },
  {
    term: "Insurable Risk",
    def: "A risk where the loss must be capable of being defined, accidental, large enough to cause hardship, part of a homogeneous group, not subject to catastrophic simultaneous loss, and both the cost and chance of loss must be calculable.",
    wrong: ["Loss Risk", "Pure Risk", "Speculative Risk"],
    explain: "Pure Risk is close — it means only loss or no loss can happen. But Pure Risk is just one type of risk. To actually be covered, it also has to meet all the other rules — which is what makes it an Insurable Risk."
  },
  {
    term: "Hazard",
    def: "A condition that increases the chance of loss. It is NOT the cause of loss itself — it makes a loss more likely or more severe when a peril occurs.",
    wrong: ["Peril", "Occurrence", "Exposure"],
    explain: "Storing gasoline near a furnace is a hazard. The fire (peril) causes the loss, but the gasoline storage (hazard) made it more likely to happen. A Hazard is a condition — not the cause."
  },
  {
    term: "Pure Risk",
    def: "A type of risk that involves ONLY the chance of loss — there is no possibility of financial gain. Insurance is designed to cover only this type of risk.",
    wrong: ["Speculative Risk", "Moral Risk", "Normal Risk"],
    explain: "Your house either burns down or it doesn't — you can't profit from it. That's Pure Risk: only loss is possible, never gain. This is exactly what insurance is designed to cover."
  },
  {
    term: "Speculative Risk",
    def: "All of the following are used to determine an insurable risk EXCEPT which one?",
    wrong: ["Risk of loss must represent a financial hardship", "Cost of insurance must be affordable", "Loss must be calculable"],
    explain: "Speculative Risk means you might win OR lose — like gambling or starting a business. Insurance is never allowed to cover that. It is actually illegal to insure speculative risks!"
  },
  {
    term: "Losses that are catastrophic in nature",
    def: "All of the following are characteristics of an ideally insurable loss exposure EXCEPT which one?",
    wrong: ["Large number of similar exposure units", "Losses that are accidental", "Losses that are definite and measurable"],
    explain: "Insurance works by spreading small losses across many people in a pool. But if ONE event wipes everybody out at the same time — like a massive earthquake destroying an entire city — there's no pool big enough to handle it. Catastrophic losses break the whole system."
  }
];

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
var answered1 = 0;
var correct1  = 0;
var LETTERS   = ['A','B','C','D'];

// ═══════════════════════════════════════════════════════════
//  SHUFFLE
// ═══════════════════════════════════════════════════════════
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

// ═══════════════════════════════════════════════════════════
//  BUILD QUIZ 1
// ═══════════════════════════════════════════════════════════
function buildQ1() {
  answered1 = 0;
  correct1  = 0;
  updateUI();

  var wrap = document.getElementById('cards1');
  wrap.innerHTML = '';
  var shuffledQ = shuffle(QUESTIONS);

  for (var i = 0; i < shuffledQ.length; i++) {
    (function(q, qIndex) {
      var opts = shuffle([q.term].concat(q.wrong));
      var card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = (qIndex * 0.03) + 's';

      var optHTML = '';
      for (var k = 0; k < opts.length; k++) {
        optHTML += '<button class="opt-btn" data-answer="' + encodeURIComponent(opts[k]) + '">' +
          '<span class="opt-letter">' + LETTERS[k] + '</span>' +
          '<span>' + opts[k] + '</span>' +
          '</button>';
      }

      card.innerHTML =
        '<div class="q-badge">Question ' + (qIndex + 1) + ' of ' + QUESTIONS.length + '</div>' +
        '<div class="q-text">' + q.def + '</div>' +
        '<div class="options">' + optHTML + '</div>' +
        '<div class="feedback"></div>';

      wrap.appendChild(card);

      var buttons = card.querySelectorAll('.opt-btn');
      for (var b = 0; b < buttons.length; b++) {
        buttons[b].addEventListener('click', (function(btn, correctTerm, explanation) {
          return function() {
            var selected = decodeURIComponent(btn.getAttribute('data-answer'));
            var allBtns = card.querySelectorAll('.opt-btn');
            for (var x = 0; x < allBtns.length; x++) {
              allBtns[x].disabled = true;
              if (decodeURIComponent(allBtns[x].getAttribute('data-answer')) === correctTerm) {
                allBtns[x].classList.add('correct');
              }
            }
            var fb = card.querySelector('.feedback');
            if (selected === correctTerm) {
              btn.classList.add('correct');
              fb.className = 'feedback fb-correct';
              fb.innerHTML = '<span class="fb-label">Correct! ✓</span>' + explanation;
              correct1++;
            } else {
              btn.classList.add('wrong');
              fb.className = 'feedback fb-wrong';
              fb.innerHTML = '<span class="fb-label">Not quite! The answer is: ' + correctTerm + '</span>' + explanation;
            }
            answered1++;
            updateUI();
          };
        })(buttons[b], q.term, q.explain));
      }
    })(shuffledQ[i], i);
  }
}

// ═══════════════════════════════════════════════════════════
//  UPDATE SCORE UI
// ═══════════════════════════════════════════════════════════
function updateUI() {
  var t = QUESTIONS.length;
  document.getElementById('s1').textContent = correct1 + ' / ' + t;
  document.getElementById('bar1').style.width = ((answered1 / t) * 100) + '%';
  document.getElementById('prog1').textContent = answered1 + ' of ' + t + ' answered';
}

// ═══════════════════════════════════════════════════════════
//  TAB SWITCH
// ═══════════════════════════════════════════════════════════
function switchTab(id, btn) {
  var sections = document.querySelectorAll('.quiz-section');
  for (var i = 0; i < sections.length; i++) sections[i].classList.remove('active');
  var navBtns = document.querySelectorAll('.nav-btn');
  for (var j = 0; j < navBtns.length; j++) navBtns[j].classList.remove('active');
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
buildQ1();
</script>
</body>
</html>
